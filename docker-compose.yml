version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: alumni_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - alumni_network

  redis:
    image: redis:alpine
    container_name: alumni_redis
    ports:
      - "6379:6379"
    networks:
      - alumni_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alumni_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/alumniconnect
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=production_secret_key_change_me
      - CLIENT_URL=http://localhost:80
    depends_on:
      - mongodb
      - redis
    networks:
      - alumni_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alumni_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - alumni_network

volumes:
  mongodb_data:

networks:
  alumni_network:
    driver: bridge
